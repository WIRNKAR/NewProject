<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Beli Metal Fabrication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area text-center mb-4">
                <i class="fas fa-hammer text-danger" style="font-size: 3rem;"></i>
                <h3 class="mt-3 text-dark">Beli Metal Fabrication</h3>
                <p class="text-muted small">Admin Portal</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>

                <button type="submit" class="btn btn-danger btn-lg w-100" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">© 2026 Beli Metal Fabrication</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
